---
layout: default
---

<style>
.header .header-box .col-3 {
  display: none !important;
}

.header .header-box .col-9,
.header .header-box .wd-mob {
  width: 100% !important;
  max-width: 900px !important;
  margin: 0 auto !important;
  float: none !important;
  text-align: center !important;
}

.header .container {
  max-width: 900px !important;
  margin: 0 auto !important;
}

.header-box {
  justify-content: center !important;
}

.header-box .col-9 {
  margin-left: 0 !important;
  padding-left: 0 !important;
}
</style>

<div class="container">

  <div style="max-width: 900px; margin: 60px auto 40px auto;">

    <h1 style="margin-bottom: 10px;">{{ page.title }}</h1>

    <div style="margin-bottom: 20px;">
      {% for tag in page.tags %}
        <span style="border:1px solid #00bfa5; color:#00d6b4; padding:4px 8px; margin-right:6px; font-size:12px;">
          {{ tag }}
        </span>
      {% endfor %}
    </div>

    {{ content }}

  </div>

</div>
