<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body style="margin:0; background:#2b2f36; color:#fff; font-family: Arial, sans-serif;">

  <header style="background:#111; padding:30px 20px 20px 20px; text-align:center;">
    <div style="max-width:900px; margin:0 auto;">
      <h1 style="margin:0 0 8px 0; font-size:34px; font-weight:400;">
        {{ site.title }}
      </h1>

      <h2 style="margin:0; font-size:30px; font-weight:400; line-height:1.25;">
        {{ site.subtitle }}
      </h2>

      <div style="height:2px; background:#ddd; margin:14px auto 18px auto; max-width:760px;"></div>

      <p style="max-width:760px; margin:0 auto 40px auto; text-align:left; line-height:1.6; font-size:15px;">
        {{ site.description }}
      </p>

      <nav style="display:flex; justify-content:space-between; max-width:760px; margin:0 auto; font-size:15px;">
        <a href="#" style="color:#fff; text-decoration:none;">📍 {{ site.location }}</a>
        <a href="{{ site.github }}" style="color:#fff; text-decoration:none;">GitHub</a>
        <a href="{{ site.linkedin }}" style="color:#fff; text-decoration:none;">LinkedIn</a>
        <a href="{{ site.resume_url }}" style="color:#fff; text-decoration:none;">Resume</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer style="background:#111; padding:40px 50px; color:#fff; font-size:12px;">
    <strong style="letter-spacing:6px;">{{ site.title | upcase }}</strong>
    <hr style="border-color:#333; margin-top:30px;">
    <p>© 2026 {{ site.title }} Powered by Jekyll</p>
  </footer>

</body>
</html>
